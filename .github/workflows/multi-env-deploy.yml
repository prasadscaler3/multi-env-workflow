name: Multi-Environment Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target deployment environment'
        type: choice
        required: true
        default: 'dev'
        options:
          - dev
          - staging
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Deployment Logic
        run: |
          echo "Initiating deployment pipeline..."
          echo "Deploying application to the ${{ github.event.inputs.environment }} environment."
          echo "Deployment to ${{ github.event.inputs.environment }} completed successfully."

